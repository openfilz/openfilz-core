# src/main/resources/application.yml
spring:
  application:
    name: openfilz-api
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dms_db}
    username: ${DB_USER:dms_user}
    password: ${DB_PASSWORD:dms_password}
    initialization-mode: always
    pool:
      enabled: true
      initial-size: 5
      max-size: 10
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dms_db}
    user: ${DB_USER:dms_user}
    password: ${DB_PASSWORD:dms_password}
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_REALM_URL:http://localhost:8180/realms/openfilz}/protocol/openid-connect/certs

  sql:
    init:
      mode: always

  graphql:
    graphiql:
      enabled: true
    http:
      path: /graphql/v1

# Storage Configuration
storage:
  type: local # local or minio
  local:
    base-path: /tmp/dms-storage
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:dms-bucket}
    versioning-enabled: false

# Swagger / OpenAPI
openapi:
  service:
    title: openfilz-api
    url: ${API_ROOT_URL:http://localhost:8081/}
    version: 1.0.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging for auditing (can be more sophisticated)
logging:
  level:
    org.openfilz: DEBUG
    io.r2dbc.postgresql.QUERY: DEBUG # for queries
    org.apache.pdfbox: ERROR
    org.apache.pdfbox.contentstream.PDFStreamEngine: OFF  # Suppress non-critical "Operator rg has too few operands" from Gotenberg-converted PDFs
    org.apache.fontbox: ERROR
    # io.r2dbc.postgresql.PARAM: DEBUG # for parameters
    # org.springframework.security: TRACE

server:
  port: 8081
  http2:
    enabled: false

# Buffer size for PipedInputStreams
piped:
  buffer:
    size: 8192

openfilz:
  common:
    # URL that OnlyOffice DocumentServer uses to reach OpenFilz API
    # Use host.docker.internal when OnlyOffice run in Docker and OpenFilz runs on host
    api-internal-base-url: ${OPENFILZ_INTERNAL_API_BASE_URL:http://host.docker.internal:8081}
    api-public-base-url: ${OPENFILZ_PUBLIC_API_BASE_URL:http://localhost:8081}

  # Quota Configuration
  quota:
    # Maximum file size for each uploaded file in megabytes (MB)
    # 0 = no limit (default), > 0 = max file size in MB per file
    file-upload: ${OPENFILZ_QUOTA_FILE_UPLOAD:0}
    # Maximum total storage quota per user in megabytes (MB)
    # 0 = no limit (default), > 0 = max total storage in MB per user
    user: ${OPENFILZ_QUOTA_USER:0}

  # AI Document Chat Configuration
  ai:
    active: false  # Set to true to enable AI chat features
    system-prompt: |
      You are OpenFilz AI Assistant, a helpful document management assistant.
      You help users find, organize, and understand their documents stored in OpenFilz.

      IMPORTANT RULES:
      1. You have access to tools. When the user asks to find, search, list, create, move, rename, count, read, or summarize documents, call the appropriate tool directly. NEVER describe what tool you would call or show JSON — just call it.
      2. When asked to summarize or explain a document, use readDocumentContent to read it, then provide the summary directly. Do not ask the user for permission or more context.
      3. Present results in a clear, user-friendly format. Use document names, not IDs.
      4. If the user does not specify a target folder for a move or creation, use the root folder (null).
      5. Only ask for confirmation before destructive actions (delete, rename). For read-only operations (search, list, read, summarize), act immediately.
      6. When relevant document content is provided in the context, USE IT to answer the question. Always mention the document name in your answer. Do not say "no documents found" when context has already been provided.
    embedding:
      chunk-size: 1000       # Characters per text chunk
      chunk-overlap: 200     # Overlap between chunks
      top-k: 5               # Number of similar chunks to retrieve
      similarity-threshold: 0.3  # Minimum similarity score (0.0 - 1.0) — lower = more results, higher = stricter match

  calculate-checksum: false
  #  calculate-checksum: default false - if true : calculate checksum of each new or modified file

  # TUS Protocol Configuration (Resumable Uploads)
  # Enables chunked uploads to bypass Cloudflare's 100MB limit
  tus:
    enabled: ${TUS_ENABLED:true}
    # Temporary storage path for TUS uploads in progress
    temp-storage-path: ${TUS_TEMP_STORAGE:/tmp/tus-uploads}
    # Maximum upload size in bytes (default: 10GB)
    max-upload-size: ${TUS_MAX_UPLOAD_SIZE:10737418240}
    # Recommended chunk size in bytes (default: 50MB - safely under Cloudflare's 100MB limit)
    chunk-size: ${TUS_CHUNK_SIZE:52428800}
    # Upload expiration period in milliseconds (default: 24 hours)
    upload-expiration-period: ${TUS_UPLOAD_EXPIRATION:86400000}
    # Cleanup interval for expired uploads in milliseconds (default: 1 hour)
    cleanup-interval: ${TUS_CLEANUP_INTERVAL:3600000}

  security:
    no-auth: true # No authentication required
    worm-mode: false # if true : only read-only endPoints (for list, query and download) and upload (and upload-multiple) endPoints are accessible
    custom-roles: false # if true : you can provide a custom implementation of org.openfilz.dms.config.DefaultAuthSecurityConfig and org.openfilz.dms.security.impl.SecurityServiceImpl
    cors-allowed-origins: http://localhost:4200/ # Comma-separated list of authorized origins
    role-token-lookup: REALM_ACCESS # GROUPS or REALM_ACCESS (default value) : optional value used in org.openfilz.dms.security.impl.AbstractSecurityService to retrieve Role information from Groups or from the Realm_access
    root-group: OPENFILZ # when role-token-lookup is GROUP, name of the root group holding the 3 Roles as subgroups : eg. 'OPENFILZ' is the root group in the group /OPENFILZ/AUDITORS

  full-text:
    active: false
    default-index: openfilz
    content-languages: fr,en # Stemmer languages for content analysis (e.g. fr,en,de,es,it,nl,pt,ar)
    indexation-mode: local # local (only choice for the moment) -> to be developed : redis | kafka | nats
    opensearch:
      host: localhost
      port: 9200
      scheme: https
      username: admin
      password: yourStrongPassword123!
  audit:
    excluded-actions: [] # Actions to exclude from auditing, e.g. [DOWNLOAD_DOCUMENT, COPY_FILE]
    chain:
      enabled: true
      algorithm: SHA-256
      verification-cron: "0 0 3 * * ?"
      verification-enabled: true
  soft-delete:
    active: false
    # Properties below soft-delete.recycle-bin are used only when soft-delete.active is true
    recycle-bin:
      enabled: true # Enable recycle bin functionality (soft delete)
      auto-cleanup-interval: "30 days" # Number of days before automatically deleting items from recycle bin (0 = never auto-delete)
      cleanup-cron: "0 0 2 * * ?" # Cron expression for cleanup job (daily at 2 AM)
  # Thumbnail Generation Configuration
  thumbnail:
    active: false  # Feature toggle - set to true to enable thumbnail generation
    gotenberg:
      url: ${GOTENBERG_URL:http://localhost:8083}  # Gotenberg service URL (for PDFs and Office docs)
      timeout-seconds: 60  # Timeout for document conversion
    storage:
      use-main-storage: true  # true: storage type follows storage.type; false: uses type below
      type: local  # Storage type for thumbnails when use-main-storage=false (local or minio)
      local:
        base-path: ${THUMBNAIL_STORAGE_BASE_PATH:/tmp/dms-thumbnails}
      minio:
        bucket-name: ${THUMBNAIL_BUCKET_NAME:dms-thumbnails}
    pdf-max-size-bytes: ${THUMBNAIL_PDF_MAX_SIZE_BYTES:104857600}  # 100 MB - PDFs larger than this skip thumbnail rendering to avoid OOM
    dimensions:
      width: 100
      height: 100

# OnlyOffice DocumentServer Integration
onlyoffice:
  enabled: ${ONLYOFFICE_ENABLED:false}
  document-server:
    url: ${ONLYOFFICE_URL:http://localhost}
    api-path: /web-apps/apps/api/documents/api.js
  jwt:
    enabled: true
    secret: ${ONLYOFFICE_JWT_SECRET:openfilz-onlyoffice-jwt-secret-2024}
  supported-extensions:
    - docx
    - doc
    - xlsx
    - xls
    - pptx
    - ppt
    - odt
    - ods
    - odp
    - pdf

# ============================================================
# Spring AI Configuration (only used when openfilz.ai.active=true)
# ============================================================
# Ollama (default for local development)
spring.ai.ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  chat:
    enabled: ${OLLAMA_CHAT_ENABLED:false}
    model: ${OLLAMA_CHAT_MODEL:qwen2.5}
  embedding:
    enabled: ${OLLAMA_EMBEDDING_ENABLED:false}
    model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

# OpenAI-compatible API (for cloud providers: OpenAI, Anthropic via proxy, etc.)
# Note: api-key defaults to 'disabled' (not empty) to prevent OpenAI auto-configuration
# from failing at startup. When actually using OpenAI, set OPENAI_API_KEY to your real key.
spring.ai.openai:
  api-key: ${OPENAI_API_KEY:disabled}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  chat:
    enabled: ${OPENAI_CHAT_ENABLED:false}
    model: ${OPENAI_CHAT_MODEL:gpt-4o}
  embedding:
    enabled: ${OPENAI_EMBEDDING_ENABLED:false}
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  image:
    enabled: false
  audio:
    speech:
      enabled: false
    transcription:
      enabled: false
  moderation:
    enabled: false

# PgVector Store (auto-configured when spring-ai-starter-vector-store-pgvector is on classpath)
spring.ai.vectorstore.pgvector:
  index-type: hnsw
  distance-type: cosine_distance
  dimensions: 768
  initialize-schema: false  # We manage schema with Flyway

# Database schema initialization (e.g., Flyway or Liquibase if preferred)
# For simple R2DBC, you might use an InitializingBean to create tables
# Example:
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:schema.sql
