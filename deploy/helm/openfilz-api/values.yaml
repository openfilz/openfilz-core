# openfilz-api Helm chart values
#
# This chart deploys the OpenFilz API backend.
# Environment variables are aligned with the Dokploy reference deployment.

# -- Global settings passed to all sub-charts.
global: {}

route:
  hostname: &route-hostname ""

# -- Common labels and annotations for all resources.
common: {}

# -- OpenShift-specific configuration.
openshift:
  enabled: false
  route:
    enabled: false
    hostname: *route-hostname
    tls:
      enabled: true
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"
      # IMPORTANT: Do not commit plain-text keys/certificates to Git.
      key: ""
      certificate: ""
      caCertificate: ""
      destinationCACertificate: ""

# -- Number of replicas.
replicaCount: 1

# -- Container image configuration.
image:
  registry: ghcr.io
  repository: openfilz/openfilz-api
  tag: latest
  pullPolicy: Always
  pullSecrets: []

# -- API server settings.
api:
  # Container port (Paketo buildpack default = 8080)
  port: 8080
  # Comma-separated CORS origins
  corsAllowedOrigins: ""

# -- Spring Boot profile.
spring:
  activeProfile: ""

# -- Database connection (PostgreSQL via R2DBC + Flyway).
database:
  host: "postgres"
  port: 5432
  name: "openfilz"
  # -- Credentials: either set user/password here, or use existingSecret.
  # If existingSecret is set, user/password below are ignored.
  user: "openfilz"
  password: ""
  # -- Name of an existing K8s Secret with keys: `user`, `password`.
  existingSecret: ""
  flyway:
    baselineOnMigrate: true
    baselineVersion: "0"

# -- Security / Keycloak configuration.
security:
  # Set to true to disable authentication (development only)
  noAuth: false
  # Internal Docker/K8s URL for Keycloak realm (used by API for JWK fetching)
  keycloakRealmUrl: "http://keycloak:8080/realms/openfilz"

# -- Storage configuration.
storage:
  # Storage backend: 'local' or 'minio'
  type: local
  # Mount path inside the container
  basePath: /var/data/openfilz

# -- Storage init container.
# Fixes volume ownership for Paketo buildpack images (UID 1002, GID 1000).
# Only runs when storage.type=local.
storageInit:
  enabled: true
  image: busybox:latest
  uid: 1002
  gid: 1000

# -- Application URLs.
urls:
  # Internal API URL (inter-service communication inside the cluster)
  internal: "http://openfilz-api:8080"
  # Public API URL (used for external-facing links)
  public: ""
  # API root URL (hostname for redirect/link generation)
  apiRoot: ""

# -- Feature toggles.
features:
  softDelete: true
  calculateChecksum: false
  thumbnail:
    active: false
    gotenbergUrl: "http://gotenberg:3000"
    storagePath: ""
  fulltext:
    active: false
    opensearchHost: "opensearch"
    opensearchPort: 9200
    opensearchScheme: http
  onlyoffice:
    enabled: false
    url: "http://onlyoffice"
    jwtSecret: ""
  quota:
    # Max file upload size in MB
    fileUpload: 1024
    # Max user storage quota in MB
    user: 2048

# -- Extra environment variables (stored in a chart-managed ConfigMap).
# Example:
#   extraEnv:
#     STORAGE_MINIO_ENDPOINT: "http://minio:9000"
#     STORAGE_MINIO_ACCESS_KEY: "minioadmin"
extraEnv: {}

# -- Existing Secret to inject as env vars via envFrom.
extraEnvSecretRef: ""

# -- Service configuration.
service:
  type: ClusterIP
  port: 80

# -- Ingress configuration (ignored when openshift.enabled=true).
ingress:
  enabled: true
  ingressClassName: "nginx"
  swagger:
    enabled: true
  paths:
    - /api
    - /graphql
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "16"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "256k"
    nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "2048m"
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.org/client-max-body-size: "1024m"
  labels: {}

# -- Persistence configuration.
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClass: ""
  hostPath: /tmp/kube-storage
  existingClaim: ""

# -- Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1024Mi
