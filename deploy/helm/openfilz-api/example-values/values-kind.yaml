# Example values for a standard Kubernetes (kind) deployment

openshift:
  enabled: false
  route:
    enabled: false

ingress:
  enabled: true

persistence:
  enabled: true
  size: 1Gi

# -- Database connection (for test/dev purposes only).
# In production, use existingSecret or --set for credentials.
database:
  host: openfilz-postgres
  name: openfilz
  user: openfilz
  password: openfilz

# -- Security: set noAuth=true for local dev without Keycloak.
security:
  noAuth: false
  keycloakRealmUrl: "http://keycloak:8080/realms/openfilz"

# -- Storage
storage:
  type: local
  basePath: /var/data/openfilz

# -- URLs (adjust hostnames to match your ingress)
urls:
  internal: "http://openfilz-api:8080"
  public: "http://localhost:8080"

# -- Feature toggles (enable as needed)
# features:
#   softDelete: true
#   calculateChecksum: false
#   thumbnail:
#     active: true
#     gotenbergUrl: "http://gotenberg:3000"
#   fulltext:
#     active: true
#     opensearchHost: "opensearch"
#   onlyoffice:
#     enabled: true
#     url: "http://onlyoffice"
#     jwtSecret: "my-secret"

# -- Extra environment variables (e.g. for MinIO credentials)
# extraEnv:
#   STORAGE_MINIO_ENDPOINT: "http://minio:9000"
#   STORAGE_MINIO_ACCESS_KEY: "minioadmin"
#   STORAGE_MINIO_SECRET_KEY: "minioadmin"
