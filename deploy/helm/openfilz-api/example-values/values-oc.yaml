# Example values for an OpenShift deployment

openshift:
  enabled: true
  route:
    enabled: true
    # hostname: "api.openfilz.apps.my-cluster.com"
    tls:
      enabled: true
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"
      # In production, provide certs via --set or sealed secrets.
      # key: ""
      # certificate: ""

ingress:
  enabled: false

persistence:
  enabled: true
  size: 1Gi

# -- Use an existing Secret for DB credentials in production.
database:
  host: my-db.svc.cluster.local
  name: openfilz
  existingSecret: db-credentials

# -- Security
security:
  noAuth: false
  keycloakRealmUrl: "http://keycloak:8080/realms/openfilz"

# -- URLs
urls:
  internal: "http://openfilz-api:8080"
  public: "https://api.openfilz.apps.my-cluster.com"
  apiRoot: "https://api.openfilz.apps.my-cluster.com/"

# -- Extra environment variables
# extraEnv:
#   STORAGE_MINIO_ENDPOINT: "http://minio:9000"

# -- Inject sensitive env vars from an existing Secret.
# extraEnvSecretRef: "my-app-secrets"
