# Example values for an OpenShift deployment

openshift:
  enabled: true
  route:
    enabled: true
    # hostname: "app.openfilz.apps.my-cluster.com"
    tls:
      enabled: true
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"
      # In production, provide certs via --set or sealed secrets.
      # key: ""
      # certificate: ""

ingress:
  enabled: false

# -- Frontend application configuration.
# Adjust URLs to match your OpenShift Route hostnames.
app:
  apiUrl: "https://api.openfilz.apps.my-cluster.com/api/v1"
  graphQlUrl: "https://api.openfilz.apps.my-cluster.com/graphql/v1"
  authenticationEnabled: "true"
  authenticationAuthority: "https://auth.openfilz.apps.my-cluster.com/realms/openfilz"
  authenticationClientId: "openfilz-web"
  onlyofficeEnabled: "false"
  onlyofficeUrl: ""

# -- Remaining values can inherit from the defaults in values.yaml.
# replicaCount: 2
# image:
#   tag: "1.2.3"
