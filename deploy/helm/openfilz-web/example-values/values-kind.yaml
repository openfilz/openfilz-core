# Example values for a standard Kubernetes (kind) deployment

openshift:
  enabled: false
  route:
    enabled: false

ingress:
  enabled: true

# -- Frontend application configuration.
# Adjust URLs to match your API ingress hostname.
app:
  apiUrl: "http://localhost/api/v1"
  graphQlUrl: "http://localhost/graphql/v1"
  authenticationEnabled: "false"
  authenticationAuthority: "http://localhost:8180/realms/openfilz"
  authenticationClientId: "openfilz-web"
  onlyofficeEnabled: "false"
  onlyofficeUrl: ""

# -- Remaining values can inherit from the defaults in values.yaml.
