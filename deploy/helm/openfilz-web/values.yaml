# openfilz-web Helm chart values
#
# This chart deploys the OpenFilz Angular frontend (nginx).
# The ngx-env.js ConfigMap is generated from the app.* values below.

# -- Global settings passed to all sub-charts.
global: {}

# -- Common labels and annotations for all resources.
common: {}

# -- OpenShift-specific configuration.
openshift:
  enabled: false
  route:
    enabled: false
    hostname: ""
    tls:
      enabled: true
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"
      # IMPORTANT: Do not commit plain-text keys/certificates to Git.
      key: ""
      certificate: ""
      caCertificate: ""
      destinationCACertificate: ""

# -- Number of replicas.
replicaCount: 1

# -- Container image configuration.
image:
  registry: ghcr.io
  repository: openfilz/openfilz-web
  tag: latest
  pullPolicy: Always
  pullSecrets: []

# -- Frontend application configuration.
# These values are injected into the Angular app via ngx-env.js ConfigMap.
app:
  apiUrl: "https://api.your-domain.com/api/v1"
  graphQlUrl: "https://api.your-domain.com/graphql/v1"
  authenticationEnabled: "true"
  authenticationAuthority: "https://auth.your-domain.com/realms/openfilz"
  authenticationClientId: "openfilz-web"
  onlyofficeEnabled: "false"
  onlyofficeUrl: ""

# -- Service configuration.
service:
  type: ClusterIP
  port: 80

# -- Ingress configuration (ignored when openshift.enabled=true).
ingress:
  enabled: true
  ingressClassName: "nginx"
  path: "/"
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "16"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "256k"
    nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "2048m"
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.org/client-max-body-size: "1024m"
  labels: {}
