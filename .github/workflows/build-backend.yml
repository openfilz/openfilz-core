# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build Backend with Maven

on:
  push:
    branches: [ "develop" ]
    paths-ignore:
      - 'openfilz-web/**'
      - '*.md'
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'maven-release-bot' && github.actor != 'maven-release-bot[bot]'
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git Credentials
        run: |
          git config --global user.name "maven-release-bot[bot]"
          git config --global user.email "maven-release-bot[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com" > ~/.git-credentials

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "git",
              "username": "x-access-token",
              "password": "${{ steps.app-token.outputs.token }}"
            }]
          mirrors: |
            [{
               "id": "central",
               "name": "central-mirror",
               "mirrorOf": "central",
               "url": "https://repo1.maven.org/maven2"
            }]

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn -Dmaven.wagon.http.retryHandler.count=3 -B clean install --file pom.xml

      # ──── Non-Java SDK Sample Tests ────────────────────────────────
      - name: Setup Node.js for TypeScript SDK tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python for Python SDK tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup .NET for C# SDK tests
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start PostgreSQL for SDK sample tests
        run: |
          docker run -d --name sdk-test-pg -p 15432:5432 \
            -e POSTGRES_DB=sdk_test_db -e POSTGRES_USER=sdk_user \
            -e POSTGRES_PASSWORD=sdk_pass postgres:18.1
          until docker exec sdk-test-pg pg_isready -U sdk_user; do sleep 1; done

      - name: Start OpenFilz API for SDK sample tests
        run: |
          java -jar openfilz-api/target/openfilz-api-*-exec.jar \
            --server.port=18081 \
            --spring.r2dbc.url=r2dbc:postgresql://localhost:15432/sdk_test_db \
            --spring.r2dbc.username=sdk_user \
            --spring.r2dbc.password=sdk_pass \
            --spring.flyway.url=jdbc:postgresql://localhost:15432/sdk_test_db \
            --spring.flyway.user=sdk_user \
            --spring.flyway.password=sdk_pass \
            --openfilz.security.no-auth=true \
            --storage.type=local \
            --storage.local.base-path=/tmp/sdk-test-storage &
          echo $! > /tmp/openfilz-api.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18081/actuator/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            sleep 2
          done

      - name: Test TypeScript SDK samples
        run: |
          cd openfilz-sdk/openfilz-sdk-typescript/target/generated-sdk/typescript
          npm install
          cd ../../../samples
          npm install
          OPENFILZ_API_URL=http://localhost:18081 npm test

      - name: Test Python SDK samples
        run: |
          cd openfilz-sdk/openfilz-sdk-python/samples
          pip install -r requirements.txt
          pip install ../target/generated-sdk/python/
          OPENFILZ_API_URL=http://localhost:18081 pytest -v

      - name: Test C# SDK samples
        run: |
          cd openfilz-sdk/openfilz-sdk-csharp/samples
          OPENFILZ_API_URL=http://localhost:18081 dotnet test --verbosity normal

      - name: Cleanup SDK test infrastructure
        if: always()
        run: |
          if [ -f /tmp/openfilz-api.pid ]; then kill $(cat /tmp/openfilz-api.pid) 2>/dev/null || true; fi
          docker rm -f sdk-test-pg 2>/dev/null || true

      - name: Generate JaCoCo Badge
        id: jacoco-badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: >
            openfilz-api/target/jacoco/jacoco.csv

      - name: Log coverage percentage
        run: |
          echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "branches = ${{ steps.jacoco.outputs.branches }}"

      - name: Commit and push
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          cd .github/badges
          if [[ `git status --porcelain *.svg` ]]; then
            git add *.svg
            git commit -m "Autogenerated JaCoCo coverage badge" *.svg
            git push
          fi

      - name: Upload Report
        uses: 'actions/upload-artifact@v7'
        with:
          name: jacoco-report
          path: ${{ github.workspace }}/openfilz-api/target/jacoco

      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/openfilz-api/target/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f ~/.git-credentials
          git config --global --unset credential.helper || true
